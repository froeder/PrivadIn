name: Deploy Firebase

on:
  push:
    branches:
      - main

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.18.0

      - name: Build app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_DAILY_LOG_LIMIT: ${{ secrets.VITE_DAILY_LOG_LIMIT }}

      # Injeção direta da Service Account para o deploy das regras do Firestore
      # - name: Deploy Firestore Rules
      #   run: npx firebase-tools@15.18.0 deploy --only firestore:rules --non-interactive --project=privadin-d7ebe
      #   env:
      #     FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Use a service account JSON and GOOGLE_APPLICATION_CREDENTIALS for authentication
      - name: Write Service Account to file
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > $GITHUB_WORKSPACE/firebase-service-account.json

      - name: Deploy Hosting
        run: npx firebase-tools@15.18.0 deploy --only hosting --non-interactive --project=privadin-d7ebe
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json